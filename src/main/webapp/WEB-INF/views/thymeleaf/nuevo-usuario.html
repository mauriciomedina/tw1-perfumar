<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>PerfumAR</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400..900;1,400..900&amp;family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/main.css}" />
  <style>
    :root {
      --primary: #000000;
      --secondary: #5d5f5f;
      --background: #f9f9f9;
      --surface: #ffffff;
      --outline-variant: #cfc4c5;
      --font-display: 'Bodoni Moda', serif;
      --font-body: 'Hanken Grotesk', sans-serif;
    }
  
    body {
      background-color: var(--background);
      font-family: 'Hanken Grotesk', sans-serif;
      color: #1a1c1c;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
  
    .font-display {
      font-family: 'Bodoni Moda', serif;
    }
  
    .font-body {
      font-family: var(--font-body);
    }

    .font-label-caps {
      font-family: 'Hanken Grotesk', sans-serif;
      font-size: 11px;
      letter-spacing: 0.15em;
      font-weight: 600;
      text-transform: uppercase;
    }

    .font-body-lg {
      font-family: 'Hanken Grotesk', sans-serif;
      font-size: 16px;
    }
  
    /* Navbar Customization */
    .navbar {
      background-color: rgba(249, 249, 249, 0.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--outline-variant);
      padding: 1rem 2rem;
    }
  
    .nav-link-custom {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--secondary);
      text-decoration: none;
      transition: color 0.3s ease;
    }
  
    .nav-link-custom:hover {
      color: var(--primary);
    }
  
    .brand-logo {
      font-family: var(--font-display);
      font-size: 2.5rem;
      color: var(--primary);
      text-decoration: none;
    }
  
    /* Form Customization */
    .registration-card {
      background: var(--surface);
      padding: 3.5rem;
      max-width: 520px;
      margin: auto;
      border-radius: 0;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
      position: relative;
      z-index: 10;
    }
  
    .input-minimal {
      border: none;
      border-bottom: 1px solid var(--outline-variant);
      border-radius: 0;
      padding: 0.75rem 0;
      background: transparent;
      font-size: 16px;
    }
  
    .input-minimal:focus {
      box-shadow: none;
      border-bottom: 1px solid var(--primary);
      background: transparent;
    }
  
    .form-label-caps {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--secondary);
      margin-bottom: 0.25rem;
    }
  
    .btn-luxury {
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 0;
      padding: 1.25rem;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      transition: all 0.4s ease;
      width: 100%;
      margin-top: 2rem;
    }
  
    .btn-luxury:hover {
      background-color: #333;
      color: white;
      transform: translateY(-1px);
    }
  
    .atmospheric-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.05;
      z-index: 0;
      pointer-events: none;
    }
  
    /* Footer Customization */
    footer {
      border-top: 1px solid var(--outline-variant);
      padding: 4rem 2rem;
      background-color: var(--background);
    }
  
    .footer-link {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--secondary);
      text-decoration: none;
      transition: color 0.2s ease;
    }
  
    .footer-link:hover {
      color: var(--primary);
    }
  
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      font-size: 24px;
    }
  
    .hairline-divider {
      height: 1px;
      background-color: #E5E5E5;
      width: 100%;
      margin: 2.5rem 0;
    }
  </style>
</head>

<body>
<!-- Header -->
<nav class="navbar navbar-expand-md sticky-top">
  <div class="container-fluid px-lg-4">

    <div class="col-12 d-flex justify-content-center">
      <a class="brand-logo" href="#">PerfumAR<br></a>
    </div>

  </div>
</nav>
<!-- Main Registration Section -->
<main class="flex-grow-1 d-flex align-items-center position-relative py-5">
  <img alt="" class="atmospheric-bg"
    src="https://lh3.googleusercontent.com/aida-public/AB6AXuCY_zPKbX1-ct5iAblGiQT9_Ig0wZRFX81Ue8Qc_zI3cjI26Y94l0M60v2ZGTEAS6v8CZ5NM6DPPTWN1nXNY4PiKidbgeoL9OHj4PLr4DzwkBuhdVduJ_LDWRN4Ycz-ve-W2hnEkbPP0f9e0k8AgZ6g1clf_b-Mk0V_vXiMexueG1XP2lwMLl2vJlCCjWEZtQpIMfF47Hh3wx9HP5i9XWVIk61dqpx3pjvegvuKSOcyIXF5a8YbWQhaBf7ynQYj7Gyuqz1jpslN3yQ">
  <div class="container">
    <div class="registration-card">
      <div class="text-center mb-5">
        <h2 class="font-display h1 mb-2">Únete a PerfumAR</h2>
        <p class="form-label-caps m-0 text-secondary" style="font-size: 12px;">Comienza tu viaje curado</p>
      </div>
      <form action="#" th:action="@{/registrarme}" method="POST" th:object="${usuario}">
        <div class="mb-4">
          <label class="form-label-caps">Nombre de Usuario</label>
          <input class="form-control input-minimal" placeholder="Enter your username" type="text">
        </div>
        <div class="mb-4">
          <label class="form-label-caps">Correo Electrónico</label>
          <input class="form-control input-minimal" placeholder="email@essencearchive.com" type="email" th:field="*{email}" id="email" required>
        </div>
        <div class="row g-4 mb-4">
          <div class="col-md-6">
            <label class="form-label-caps">Contraseña</label>
            <input class="form-control input-minimal" placeholder="••••••••" type="password" th:field="*{password}" id="password" required>
          </div>
          <div class="col-md-6">
            <label class="form-label-caps">Confirmar Contraseña</label>
            <input class="form-control input-minimal" placeholder="••••••••" type="password">
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label-caps">Ciudad</label>
          <input class="form-control input-minimal" placeholder="Your current location" type="text">
        </div>
        <button class="btn btn-luxury mb-4" type="submit" id="btn-registrarme">CREAR CUENTA</button>
        <p th:if="${error != null}" class="alert alert-danger" th:text="'Error: ' + ${error}">
        </p>
      </form>
      <div class="text-center">
        <p class="font-body-lg text-secondary m-0">
          ¿Ya eres miembro?
          <a class="font-label-caps text-dark ms-2 text-decoration-none border-bottom border-dark pb-1" id="btn-register"
            href="login">INICIA SESIÓN</a>
        </p>
      </div>
    </div>
  </div>
</main>
<!-- Footer -->
<footer>
  <div class="container-fluid px-lg-4">
    <div class="row align-items-center">
      <div class="col-md-6 text-center text-md-start mb-4 mb-md-0">

        <p class="form-label-caps m-0">© 2026 PerfumAR. All rights reserved.</p>
      </div>
      <div class="col-md-6 text-center text-md-end">
        <div class="d-flex flex-column flex-md-row justify-content-md-end gap-3 gap-md-4">




        </div>
      </div>
    </div>
  </div>
</footer>
<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const card = document.querySelector('.registration-card');
    card.style.opacity = '0';
    card.style.transform = 'translateY(20px)';
    card.style.transition = 'opacity 1s ease, transform 1s cubic-bezier(0.16, 1, 0.3, 1)';

    setTimeout(() => {
      card.style.opacity = '1';
      card.style.transform = 'translateY(0)';
    }, 100);
  });
</script>
</body>

</html>
