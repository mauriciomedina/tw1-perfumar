<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>PerfumAR</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400..900;1,400..900&amp;family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <style>
    :root {
      --primary: #000000;
      --secondary: #5d5f5f;
      --background: #f9f9f9;
      --outline-variant: #cfc4c5;
      --surface: #ffffff;
    }

    body {
      background-color: var(--background);
      color: #1a1c1c;
      font-family: 'Hanken Grotesk', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .font-display { font-family: 'Bodoni Moda', serif; }
    .font-headline { font-family: 'Bodoni Moda', serif; font-size: 32px; font-weight: 400; }
    .font-label-caps { 
      font-family: 'Hanken Grotesk', sans-serif; 
      font-size: 11px; 
      letter-spacing: 0.15em; 
      font-weight: 600; 
      text-transform: uppercase; 
    }
    .font-body-lg { font-family: 'Hanken Grotesk', sans-serif; font-size: 16px; }

    /* Custom Navbar Overrides */
    .navbar {
      background-color: rgba(249, 249, 249, 0.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--outline-variant);
      padding: 16px 32px;
    }
    .nav-link {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--secondary) !important;
      transition: color 0.3s ease;
    }
    .nav-link:hover { color: var(--primary) !important; }

    /* Login Card Styles */
    .login-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 64px 32px;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--outline-variant);
      padding: 48px;
    }

    /* Form Controls Reset */
    .form-control {
      border: none;
      border-bottom: 1px solid var(--outline-variant);
      border-radius: 0;
      padding: 8px 0;
      background-color: transparent;
      font-size: 16px;
    }
    .form-control:focus {
      box-shadow: none;
      border-color: var(--primary);
      background-color: transparent;
    }
    .form-label {
      margin-bottom: 4px;
    }

    .btn-dark-custom {
      background-color: var(--primary);
      color: #fff;
      border: none;
      border-radius: 0;
      padding: 16px;
      width: 100%;
      font-size: 11px;
      letter-spacing: 0.15em;
      transition: all 0.3s ease;
    }
    .btn-dark-custom:hover {
      background-color: #333;
      color: #fff;
    }
    .btn-dark-custom:active {
      transform: scale(0.98);
    }

    .footer {
      border-top: 1px solid var(--outline-variant);
      padding: 64px 32px;
      background-color: #f9f9f9;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      cursor: pointer;
    }

    .decoration-ea {
      position: fixed;
      bottom: 0;
      right: 0;
      font-family: 'Bodoni Moda', serif;
      font-size: 220px;
      line-height: 1;
      opacity: 0.05;
      pointer-events: none;
      margin-bottom: -40px;
      margin-right: -40px;
      z-index: -1;
    }
    </style>
</head>

<body>
<!-- Navigation -->
<nav class="navbar navbar-expand-md sticky-top">
    <div class="container-fluid px-0">
        <button class="navbar-toggler border-0 shadow-none" data-bs-target="#navbarContent" data-bs-toggle="collapse"
            type="button">
            <span class="material-symbols-outlined">menu</span>
        </button>

        <div class="navbar-brand font-display fs-1 mx-auto order-1 order-md-2 flex-grow-1 text-center">PerfumAR</div>

    </div>
</nav>
<!-- Main Content -->
<main class="login-container">
    <div class="login-card">
        <div class="text-center mb-5">
            <h2 class="font-headline mb-2">Bienvenido</h2>
            <p class="font-label-caps text-muted">ACCEDE A TU COLECCIÓN CURADA</p>
        </div>
        <form action="#" th:action="@{/validar-login}" method="POST" th:object="${datosLogin}">
            <div class="mb-4">
                <label class="font-label-caps text-muted form-label">CORREO ELECTRÓNICO</label>
                <input class="form-control" placeholder="user@essencearchive.com" th:field="*{email}" id="email" type="email" required>
            </div>
            <div class="mb-5">
                <label class="font-label-caps text-muted form-label">CONTRASEÑA</label>
                <input class="form-control" placeholder="••••••••" th:field="*{password}" type="password" id="password" required>
            </div>
            <button class="btn btn-dark-custom mb-4" id="btn-login" Type="Submit">
                INICIAR SESIÓN
            </button>

            <p th:if="${error != null}" class="alert alert-danger" th:text="'Error ' + ${error}"></p>

            <div class="text-center">

                <p class="font-body-lg text-secondary m-0">
                    ¿No tienes cuenta?
                    <a class="font-label-caps text-dark ms-2 text-decoration-none border-bottom border-dark pb-1"
                        id="btn-register" href="nuevo-usuario">CREAR CUENTA</a>
                </p>
            </div>
        </form>
    </div>
</main>
<!-- Decorative Element -->
<div class="decoration-ea d-none d-lg-block">EA</div>
<!-- Footer -->
<footer class="footer mt-auto">
    <div class="container-fluid px-0">
        <div class="row align-items-center gy-4">
            <div class="col-12 col-md-4 text-center text-md-start">
                <p class="font-label-caps text-muted mb-0">ACCEDE A TU COLECCIÓN CURADA</p>
            </div>
            <div class="col-12 col-md-4 text-center">

            </div>
            <div class="col-12 col-md-4 text-center text-md-end">
                <span class="font-display h3 mb-0">PerfumAR</span>
            </div>
        </div>
    </div>
</footer>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Interaction logic for luxury feel
    const formControls = document.querySelectorAll('.form-control');
    formControls.forEach(input => {
      input.addEventListener('focus', () => {
        input.previousElementSibling.classList.replace('text-muted', 'text-dark');
      });
      input.addEventListener('blur', () => {
        input.previousElementSibling.classList.replace('text-dark', 'text-muted');
      });
    });
  </script>
  <script type="module" th:src="@{js/login.js}"></script>

</body>

</html>
