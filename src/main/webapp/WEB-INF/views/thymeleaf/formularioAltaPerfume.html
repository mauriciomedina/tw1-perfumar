<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Nuevo Perfume</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #f4f6f9; 
        }
        .form-container { 
            max-width: 650px; 
            margin: 50px auto; 
            background: #ffffff; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="form-container">
            <h2 class="mb-2 text-center fw-bold">Sumar a mi Colección</h2>
            <p class="text-center text-muted mb-4">Completá los datos para registrar una nueva fragancia y calcular su maceración.</p>
            <hr class="mb-4">

            <form action="guardar-perfume" method="POST">
                
                <div class="mb-3">
                    <label for="nombre" class="form-label fw-bold">Nombre de la fragancia</label>
                    <input type="text" class="form-control form-control-lg" id="nombre" name="nombre" placeholder="Ej: Bleecker Street" required>
                    <div class="form-text">Ingresá el nombre comercial exacto del perfume.</div>
                </div>

                <div class="mb-3">
                    <label for="marca" class="form-label fw-bold">Casa Perfumera / Marca</label>
                    <input type="text" class="form-control form-control-lg" id="marca" name="marca" placeholder="Ej: Bond No. 9" required>
                </div>

                <div class="mb-4">
                    <label for="familia" class="form-label fw-bold">Familia Olfativa Principal</label>
                    <select class="form-select form-select-lg" id="familia" name="idFamilia" required>
                        <option value="" selected disabled>Desplegá y elegí una opción...</option>
                        <option value="1">Cítrico (Fresco, Limón, Bergamota)</option>
                        <option value="2">Amaderado (Cedro, Sándalo, Oud)</option>
                        <option value="3">Floral (Rosa, Jazmín, Lavanda)</option>
                        <option value="4">Oriental (Vainilla, Ámbar, Especias)</option>
                    </select>
                </div>

                <div class="mb-3 form-check form-switch p-3 border rounded bg-light">
                    <input class="form-check-input ms-1" type="checkbox" role="switch" id="maceration-toggle" name="enMaceracion" checked style="transform: scale(1.3);">
                    <label class="form-check-label fw-bold ms-3" for="maceration-toggle">¿Dejar en maceración?</label>
                    <div class="form-text ms-3 mt-1">Dejá esta opción activa si el perfume es nuevo y querés calcular su tiempo de maduración.</div>
                </div>

                <div class="mb-5">
                    <label for="fecha" class="form-label fw-bold">Fecha de inicio de maceración</label>
                    <input type="date" class="form-control form-control-lg" id="fecha" name="fechaInicio">
                </div>

                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <a href="home" class="btn btn-outline-secondary btn-lg px-4 me-md-2">Cancelar</a>
                    <button type="submit" class="btn btn-dark btn-lg px-5">Guardar Perfume</button>
                </div>

            </form>
        </div>
    </div>

</body>
<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
