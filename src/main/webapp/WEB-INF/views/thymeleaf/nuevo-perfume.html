<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Nuevo Perfume</title>

    <!-- Boostrap core css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    <!-- custom style -->
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>
<body>
<div>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
        <a class="navbar-brand" href="#">UNLAM</a>
    </nav>

    <main role="main" class="container">
        <div class="container">
            <h1>Nuevo Perfume</h1>
            <form action="#" th:action="@{/grabarPerfume}" method="POST" th:object="${perfume}">
                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input th:field="*{nombre}" type="text" class="form-control" id="nombre" placeholder="Nombre Perfume">
                </div>
                <div class="mb-3">
                    <label for="tipo" class="form-label">Tipo</label>
                    <input th:field="*{tipo}" type="text" class="form-control" id="tipo" placeholder="Tipo Perfume">
                </div>
                <button type="submit" class="btn btn-primary">Grabar</button>
                <p th:if="${error != null}" class="alert alert-danger" th:text="'Error ' + ${error}">
            </form>
        </div>
    </main>
    <!-- /.container -->

    <!-- Boostrap core js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
            crossorigin="anonymous"></script>
</div>
</body>
</html>
