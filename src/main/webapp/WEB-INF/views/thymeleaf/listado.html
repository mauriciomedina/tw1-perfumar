<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Mi colección</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&amp;family=Hanken+Grotesk:wght@300;400;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <script type="module" th:src="@{/js/clima.js}"></script>
    <script th:src="@{/js/components/sidebar.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <mi-sidebar></mi-sidebar>

    <main class="main-content">
        <header class="header-nav">
            <div class="d-flex align-items-center gap-4">
                <div class="d-flex align-items-center gap-2 text-muted">
                    <span id="currentWeather" class="label-caps" style="font-size: 10px">Elije tu ciudad</span>
                </div>
                <input type="text" id="cityInput" placeholder="Ciudad" th:value="${session.CIUDAD}" />
                <input type="text" id="countryInput" placeholder="Pais" th:value="${session.PAIS}" />
                <button id="getWeatherBtn">Buscar</button>
                <div id="weather-info"></div>
                <div class="search-container">
                    <span class="material-symbols-outlined text-muted">search</span>
                    <input class="search-input" placeholder="Search Collection" type="text" />
                </div>
            </div>
            <div class="d-flex align-items-center gap-4">
                <a class="btn btn-link text-decoration-none text-dark p-0 label-caps" href="listar-perfumes">Listado</a>
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-link text-dark p-0">
                        <span class="material-symbols-outlined">notifications</span>
                    </button>
                    <a class="btn btn-link text-decoration-none text-dark p-0 label-caps" href="perfil.html">Perfil</a>
                </div>
            </div>
        </header>
        <section class="p-4 p-lg-5">
            <div>
                <h2 class="mb-1" style="font-family: 'Bodoni Moda', serif; font-size: 2.5rem; color: #1a1a1a;">Mi
                    Colección</h2>
                <p class="text-muted mb-0" style="font-size: 0.95rem; letter-spacing: 0.5px;">Tus fragancias
                    seleccionadas.</p>
            </div>
            <div class="text-end mb-1">
                <span class="text-muted label-caps" th:text="|${#lists.size(perfumesColeccion)} FRAGANCIAS|">0
                    FRAGANCIAS</span>
            </div>
            </div>

            <div class="container-fluid px-0">

                <div th:if="${#lists.isEmpty(perfumesColeccion)}" class="text-center py-5"
                    style="background: #fdfdfd; border: 1px dashed #e0e0e0; border-radius: 12px; margin-top: 2rem;">
                    <span class="material-symbols-outlined text-muted mb-3" style="font-size: 48px;">inventory_2</span>
                    <h4 style="font-family: 'Bodoni Moda', serif;">Tu colección está vacía</h4>
                    <p class="text-muted mb-4">Explorá el catálogo principal y añadí tus fragancias favoritas.</p>
                    <a th:href="@{/home}" class="btn btn-outline-dark px-4 py-2"
                        style="font-size: 0.75rem; letter-spacing: 2px; font-weight: 600; text-transform: uppercase;">Explorar
                        Catálogo</a>
                </div>

                <div th:unless="${#lists.isEmpty(perfumesColeccion)}" class="row">

                    <div class="col-sm-6 col-lg-4 col-xl-3 mb-4" th:each="perfume : ${perfumesColeccion}">
                        <a th:href="@{/especificacion(id=${perfume.id})}"
                            class="text-decoration-none text-reset h-100 d-block">
                            <div class="card h-100 d-flex flex-column" style="border: none; background: transparent;">
                                <div
                                    style="position: relative; width: 100%; aspect-ratio: 2/3; overflow: hidden; background-color: #f4f4f4;">
                                    <img th:alt="${perfume.nombre}" th:src="${perfume.imagenUrl}"
                                        style="width: 100%; height: 100%; object-fit: cover;">
                                    <span
                                        style="position: absolute; top: 12px; left: 12px; background: white; padding: 4px 8px; font-size: 10px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; z-index: 2;"
                                        th:text="${perfume.marca}">
                                        MARCA
                                    </span>
                                </div>

                                <div class="card-body px-0 mt-3 d-flex flex-column flex-grow-1">
                                    <p class="text-muted mb-1"
                                        style="font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase;"
                                        th:text="${perfume.familiaOlfativa}">FAMILIA</p>
                                    <h3 class="h5 mb-3" style="font-family: 'Bodoni Moda', serif;"
                                        th:text="${perfume.nombre}">Nombre Perfume</h3>
                                </div>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>

</body>

</html>
