<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PerfumAR - Especificación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Hanken+Grotesk:wght@300;400;600&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <script type="module" th:src="@{/js/clima.js}"></script>
    <script th:src="@{/js/components/sidebar.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <mi-sidebar></mi-sidebar>
    <main class="main-content">
        <header class="header-nav">
            <div class="d-flex align-items-center gap-4">
                <div class="d-flex align-items-center gap-2 text-muted">
                    <span id="currentWeather" class="label-caps" style="font-size: 10px">Elije tu ciudad</span>
                </div>
                <input type="text" id="cityInput" placeholder="Ciudad" th:value="${session.CIUDAD}" hidden />
                <input type="text" id="countryInput" placeholder="Pais" th:value="${session.PAIS}" hidden />
                <button id="getWeatherBtn" hidden>Buscar</button>
                <div id="weather-info"></div>
                <div class="search-container">
                    <span id="buscador" class="material-symbols-outlined text-muted">search</span>
                    <input class="search-input" id="inputBuscador" placeholder="Buscar perfume" type="text" />
                </div>
            </div>
            <div class="d-flex align-items-center gap-4">
                <a class="btn btn-link text-decoration-none text-dark p-0 label-caps" href="listado.html">Listado</a>
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-link text-dark p-0">
                        <span class="material-symbols-outlined">notifications</span>
                    </button>
                    <a class="btn btn-link text-decoration-none text-dark p-0 label-caps" href="perfil.html">Perfil</a>
                </div>
            </div>
        </header>

        <div class="container py-5 px-4 px-md-5">
            <div class="row align-items-center min-vh-75 g-5">
                <!-- Image Column -->
                <div class="col-lg-5">
                    <div class="product-image-container">
                        <img id="perfume-imagen" alt="Botella de perfume" src="" class="product-image">
                    </div>
                </div>
                <!-- Info Column -->
                <div class="col-lg-7 ps-lg-5">
                    <nav aria-label="breadcrumb" class="mb-4">
                        <span class="text-secondary-custom"
                            style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em;">Detalle de
                            Fragancia</span>
                    </nav>
                    <div class="mb-5">
                        <p class="text-secondary-custom mb-2" id="perfume-marca"
                            style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em;">Marca</p>
                        <h2 id="perfume-nombre" class="font-bodoni text-primary-custom display-luxury mb-3">Nombre</h2>
                        <p id="perfume-familia"
                            class="badge rounded-pill bg-transparent text-primary-custom border border-secondary border-opacity-25 px-3 py-2"
                            style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500;">Familia Olfativa</p>
                    </div>
                    <div class="mb-5">
                        <h3 class="section-title">Descripción</h3>
                        <p id="perfume-descripcion" class="text-secondary-custom lh-lg mb-0" style="font-size: 16px;"></p>
                    </div>
                    <div class="mb-5">
                        <h3 class="section-title">Notas</h3>
                        <p id="perfume-notas" class="text-secondary-custom lh-lg mb-0" style="font-size: 16px;"></p>
                    </div>
                    <div class="d-flex gap-3 pt-4">
                        <form th:action="@{/coleccion/agregar}" method="POST" class="w-100">
                            <input type="hidden" name="idPerfume" th:value="${perfume.id}" />
                            <button class="btn btn-primary-custom" type="submit">Agregar a mi colección</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        const parametros = new URLSearchParams(window.location.search);
        const idPerfume = parametros.get('id');

        if (idPerfume) {
            // Buscamos TODOS los perfumes al endpoint que ya te funciona
            fetch('/spring/api/perfumes')
                .then(respuesta => respuesta.json())
                .then(perfumes => {
                    // JavaScript busca en la lista el perfume que coincida con el ID de la URL
                    const perfume = perfumes.find(p => p.id == idPerfume);

                    if (perfume) {
                        // Si lo encuentra, inyecta los datos
                        document.getElementById('perfume-nombre').textContent = perfume.nombre;
                        document.getElementById('perfume-marca').textContent = perfume.marca.toUpperCase();
                        document.getElementById('perfume-familia').textContent = perfume.familiaOlfativa;
                        document.getElementById('perfume-imagen').src = perfume.imagenUrl;
                        document.getElementById('perfume-descripcion').textContent = perfume.descripcion;
                        document.getElementById('perfume-notas').textContent = perfume.notas;
                    } else {
                        throw new Error("No se encontró el perfume");
                    }
                })
                .catch(error => {
                    console.error('Error trayendo el perfume:', error);
                    document.getElementById('perfume-nombre').textContent = "Error al cargar";
                    document.getElementById('perfume-familia').textContent = "No pudimos cargar los datos de esta fragancia.";
                });
        } else {
            document.getElementById('perfume-nombre').textContent = "Perfume no encontrado";
            document.getElementById('perfume-familia').textContent = "Seleccioná un perfume desde el catálogo.";
        }
    </script>
</body>

</html>
