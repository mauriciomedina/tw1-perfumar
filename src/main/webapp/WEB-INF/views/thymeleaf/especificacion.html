<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PerfumAR | Especificación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    .icono-favorito-lleno { font-variation-settings: 'FILL' 1; }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Hanken+Grotesk:wght@300;400;600&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script th:src="@{/js/components/header.js}" defer></script>
    <script type="module" th:src="@{/js/clima.js}"></script>
    <script th:src="@{/js/components/sidebar.js}"></script>
    <script th:src="@{/js/components/chat.js}" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
</head>

<body>

    <mi-sidebar></mi-sidebar>

    <main class="main-content">

        <app-header th:attr="ciudad=${session.CIUDAD}, pais=${session.PAIS}"></app-header>

        <div class="container-fluid p-4 p-lg-5">
            <div class="row align-items-start g-5">

                <!-- Imagen -->
                <div class="col-lg-5">
                    <div class="product-image-container">
                        <img id="perfume-imagen" class="product-image" src="" alt="Imagen del perfume"
                            style="width: 100%; height: 500px; object-fit: cover;" />
                    </div>
                </div>

                <!-- Info Column -->
                <div class="col-lg-7 ps-lg-5">
                    <nav aria-label="breadcrumb" class="mb-4">
                        <span class="text-secondary-custom"
                            style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em;">Detalle de
                            Fragancia</span>
                    </nav>
                    <div class="mb-5">
                        <p class="text-secondary-custom mb-2" id="perfume-marca"
                            style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em;">Marca</p>
                        <h2 id="perfume-nombre" class="font-bodoni text-primary-custom display-luxury mb-3">Nombre</h2>
                        <p id="perfume-familia"
                            class="badge rounded-pill bg-transparent text-primary-custom border border-secondary border-opacity-25 px-3 py-2"
                            style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500;">
                            Familia
                            Olfativa</p>
                    </div>
                    <div class="mb-5">
                        <h3 class="section-title">Descripción</h3>
                        <p id="perfume-descripcion" class="text-secondary-custom lh-lg mb-0" style="font-size: 16px;">
                        </p>
                    </div>
                    <div class="mb-5">
                        <h3 class="section-title">Notas</h3>
                        <p id="perfume-notas" class="text-secondary-custom lh-lg mb-0" style="font-size: 16px;"></p>
                    </div>
                    <div class="d-flex gap-3 pt-4">
                        <form th:action="@{/agregar-a-coleccion(id=${perfume.id})}" method="POST" class="w-100">
                            <input type="hidden" name="idPerfume" th:value="${perfume.id}" />
                            <button class="btn btn-primary-custom" type="submit">Agregar a mi colección</button>
                        </form>
                        <button type="button" id="boton-favorito" class="btn d-flex align-items-center justify-content-center"th:classappend="${esFavorito} ? 'btn-outline-danger' : 'btn-outline-dark'"th:attr="data-id=${perfume.id},data-favorito=${esFavorito}"title="Favoritos" style="width: 52px; height: 100%;">
                        <span id="icono-favorito" class="material-symbols-outlined" th:classappend="${esFavorito} ? 'icono-favorito-lleno' : ''"th:text="${esFavorito} ? 'favorite' : 'favorite_border'">favorite_border</span>
                        </button>
                        
                    </div>
                </div>

            </div>
        </div>

        <!-- Mapa -->
        <div class="container mt-5 mb-5 p-4 bg-white rounded shadow border">
            <h3 class="text-center mb-4">Perfumerías cercanas</h3>

            <p id="mensaje-ubicacion" class="text-center text-muted fw-bold">
                Cargando mapa... (Aceptá el permiso del navegador)
            </p>

            <div id="mapa-locales" style="height: 450px; width: 100%; border-radius: 12px; border: 2px solid #ccc; display: none;"></div>
        </div>

        <!-- Reseñas -->
        <div class="container mt-5 mb-5 p-4 bg-white rounded shadow border">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="mb-0">Reseñas</h3>
                <span class="badge rounded-pill bg-transparent text-primary-custom border border-secondary border-opacity-25 px-3 py-2"
                    style="font-size: 13px;">
                    <span class="material-symbols-outlined align-middle" style="font-size: 16px; font-variation-settings: 'FILL' 1;">star</span>
                    <span th:text="${#numbers.formatDecimal(promedioPuntuacion, 1, 1)}">0.0</span>
                    (<span th:text="${#lists.size(resenas)}">0</span>)
                </span>
            </div>

            <!-- Formulario para dejar una reseña nueva -->
            <form th:action="@{/agregar-resena}" method="POST" class="mb-5 pb-4 border-bottom">
                <input type="hidden" name="idPerfume" th:value="${perfume.id}" />
                <input type="hidden" name="origen" th:value="|/especificacion?id=${perfume.id}|" />

                <div class="mb-3">
                    <label for="puntuacion" class="form-label fw-bold">Tu puntuación</label>
                    <select class="form-select" id="puntuacion" name="puntuacion" style="max-width: 220px;">
                        <option value="5">★★★★★ (5)</option>
                        <option value="4">★★★★☆ (4)</option>
                        <option value="3">★★★☆☆ (3)</option>
                        <option value="2">★★☆☆☆ (2)</option>
                        <option value="1">★☆☆☆☆ (1)</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="comentario" class="form-label fw-bold">Tu comentario</label>
                    <textarea class="form-control" id="comentario" name="comentario" rows="3" maxlength="1000"
                        placeholder="Contanos qué te pareció esta fragancia..." required></textarea>
                </div>

                <button class="btn btn-primary-custom" type="submit">Publicar reseña</button>
            </form>

            <!-- Listado de reseñas existentes -->
            <div th:if="${#lists.isEmpty(resenas)}" class="text-center text-muted py-4">
                Todavía no hay reseñas para esta fragancia. ¡Sé el primero en opinar!
            </div>

            <div th:unless="${#lists.isEmpty(resenas)}">
                <div th:each="resena : ${resenas}" class="mb-4 pb-3 border-bottom">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <span class="fw-bold" th:text="${resena.usuario != null ? resena.usuario.nombre : 'Usuario'}">Nombre Usuario</span>
                        <span class="text-warning" style="letter-spacing: 2px;">
                            <span th:each="i : ${#numbers.sequence(1, resena.puntuacion)}">★</span><span
                                th:each="i : ${#numbers.sequence(resena.puntuacion + 1, 5)}">☆</span>
                        </span>
                    </div>
                    <p class="text-secondary-custom mb-1" th:text="${resena.comentario}">Comentario de la reseña.</p>
                    <span class="text-muted" style="font-size: 12px;" th:text="${resena.fecha}">2026-01-01</span>
                </div>
            </div>
        </div>
    </div>

    </main>

    <!-- Buscar perfume -->
    <script>
        const parametros = new URLSearchParams(window.location.search);
        const idPerfume = parametros.get('id');

        if (idPerfume) {
            // Buscamos TODOS los perfumes al endpoint que ya te funciona
            fetch('/spring/api/perfumes')
                .then(respuesta => respuesta.json())
                .then(perfumes => {
                    // JavaScript busca en la lista el perfume que coincida con el ID de la URL
                    const perfume = perfumes.find(p => p.id == idPerfume);

                    if (perfume) {
                        // Si lo encuentra, inyecta los datos
                        document.getElementById('perfume-nombre').textContent = perfume.nombre;
                        document.getElementById('perfume-marca').textContent = perfume.marca.toUpperCase();
                        document.getElementById('perfume-familia').textContent = perfume.familiaOlfativa;
                        document.getElementById('perfume-imagen').src = perfume.imagenUrl;
                        document.getElementById('perfume-descripcion').textContent = perfume.descripcion;
                        document.getElementById('perfume-notas').textContent = perfume.notas;
                    } else {
                        throw new Error("No se encontró el perfume");
                    }
                })
                .catch(error => {
                    console.error('Error trayendo el perfume:', error);
                    document.getElementById('perfume-nombre').textContent = "Error al cargar";
                    document.getElementById('perfume-familia').textContent = "No pudimos cargar los datos de esta fragancia.";
                });
        } else {
            document.getElementById('perfume-nombre').textContent = "Perfume no encontrado";
            document.getElementById('perfume-familia').textContent = "Seleccioná un perfume desde el catálogo.";
        }
    </script>
  
    <!-- ubicacion -->
    <script>
    // Pedimos la ubicación directo al navegador, sin tocar la URL de la página.
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            function (posicion) {
                // ÉXITO: el usuario le dio a "Permitir"
                var lat = posicion.coords.latitude;
                var lon = posicion.coords.longitude;
                dibujarMapaConLocalesCercanos(lat, lon);
            },
            function () {
                // ERROR: el usuario le dio a "Bloquear" o cerró el cartel
                document.getElementById('mensaje-ubicacion').innerHTML =
                    "Bloqueaste la ubicación, no podemos mostrarte los locales cercanos.";
                document.getElementById('mensaje-ubicacion').classList.replace('text-muted', 'text-danger');
            }
        );
    } else {
        document.getElementById('mensaje-ubicacion').innerHTML = "Tu navegador no soporta esto.";
    }

    function dibujarMapaConLocalesCercanos(lat, lon) {
        fetch('/spring/api/locales-cercanos?lat=' + lat + '&lon=' + lon)
            .then(function (respuesta) {
                if (!respuesta.ok) throw new Error('No se pudieron traer los locales cercanos');
                return respuesta.json();
            })
            .then(function (locales) {
                // Ocultamos el texto de carga y mostramos el div del mapa
                document.getElementById('mensaje-ubicacion').style.display = 'none';
                document.getElementById('mapa-locales').style.display = 'block';

                // Armamos el mapa de Leaflet
                var map = L.map('mapa-locales', { scrollWheelZoom: false }).setView([lat, lon], 14);
                map.on('click', function () { map.scrollWheelZoom.enable(); });
                document.addEventListener('click', function (evento) {
                if (!document.getElementById('mapa-locales').contains(evento.target)) {
                map.scrollWheelZoom.disable();
                }});

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '© OpenStreetMap'
                }).addTo(map);

                // Marcador del usuario (Círculo azul)
                L.circleMarker([lat, lon], {
                    color: '#0055ff',
                    fillColor: '#0055ff',
                    fillOpacity: 0.8,
                    radius: 8
                }).addTo(map).bindPopup("<b>¡Estás acá!</b>").openPopup();

                // Dibujamos los pines de las perfumerías que devolvió el servidor
                locales.forEach(function (local) {
                    var marcador = L.marker([local.latitud, local.longitud]).addTo(map);
                    var contenido = "<div style='text-align:center;'><h6 style='margin-bottom:5px;'><b>" + local.nombre + "</b></h6><p style='margin-bottom:0;'>" + local.direccion + "</p></div>";
                    marcador.bindPopup(contenido);
                });
            })
            .catch(function (error) {
                console.error('Error trayendo los locales cercanos:', error);
                document.getElementById('mensaje-ubicacion').innerHTML =
                    "No pudimos cargar las perfumerías cercanas.";
                document.getElementById('mensaje-ubicacion').classList.replace('text-muted', 'text-danger');
            });
    }
    </script>
    <!-- Favs -->
    <script>
    document.getElementById('boton-favorito').addEventListener('click', function () {
        var boton = this;
        var icono = document.getElementById('icono-favorito');
        var idPerfume = boton.getAttribute('data-id');
        var esFavoritoActual = boton.getAttribute('data-favorito') === 'true';
        var endpoint = esFavoritoActual ? '/spring/eliminar-de-favoritos' : '/spring/agregar-a-favoritos';

        boton.disabled = true;

        var datosFormulario = new URLSearchParams();
        datosFormulario.set('idPerfume', idPerfume);

        fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: datosFormulario.toString()
        })
            .then(function (respuesta) {
                if (!respuesta.ok) throw new Error('No se pudo actualizar favoritos');

                var nuevoEstado = !esFavoritoActual;
                boton.setAttribute('data-favorito', nuevoEstado);

                if (nuevoEstado) {
                    boton.classList.remove('btn-outline-dark');
                    boton.classList.add('btn-outline-danger');
                    icono.textContent = 'favorite';
                    icono.classList.add('icono-favorito-lleno');
                } else {
                    boton.classList.remove('btn-outline-danger');
                    boton.classList.add('btn-outline-dark');
                    icono.textContent = 'favorite_border';
                    icono.classList.remove('icono-favorito-lleno');
                }
            })
            .catch(function (error) {
                console.error('Error al actualizar favoritos:', error);
            })
            .finally(function () {
                boton.disabled = false;
            });
    });
    </script>

<app-chat></app-chat>

</body>

</html>
